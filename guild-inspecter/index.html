<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>너의 길드는</title>
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />
    <script type="module" crossorigin src="./assets/index-Bfa-u3EQ.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-Xv248vzC.css">
  </head>
  <body>
    <div class="app-shell">
      <!-- 최상단 고정 프로그레스 바 -->
      <md-linear-progress id="progressBar" class="top-progress" value="0" aria-label="전체 진행률"></md-linear-progress>

      <div class="layout-container">
        <!-- 좌측 고정 컨트롤러 패널 -->
        <div class="sidebar-column">
          <aside class="layout-sidebar">
            <header class="sidebar-header">
              <p class="eyebrow">MapleStory Guild Inspector</p>
              <h1>너의 길드는</h1>
              <p id="brandSubtitle" class="sub-eyebrow">어딘가에 있을 또 하나의 길드</p>
            </header>

            <section class="sidebar-api-key" aria-label="Nexon API 키">
              <md-outlined-text-field
                id="apiKeyInput"
                label="Nexon API 키"
                type="password"
                autocomplete="off"
                supporting-text="API 키는 조회 요청 처리에만 사용되며, 저장되는 조회 결과 캐시에 포함하지 않습니다.">
                <md-icon-button id="apiKeyVisibilityButton" slot="trailing-icon" aria-label="API 키 표시">
                  <md-icon id="apiKeyVisibilityIcon" class="material-symbol-icon">visibility</md-icon>
                </md-icon-button>
              </md-outlined-text-field>
              <div class="api-key-row">
                <md-filled-button id="apiKeyButton" type="button">키 적용</md-filled-button>
                <md-assist-chip id="apiKeyStatus" label="미입력"></md-assist-chip>
              </div>
            </section>

            <section class="sidebar-form" aria-label="검색 조건">
              <md-outlined-select id="worldInput" label="월드"></md-outlined-select>

              <md-outlined-text-field id="guildInput" label="길드명" autocomplete="off"></md-outlined-text-field>

              <md-outlined-text-field id="dateInput" label="기준일" type="date"></md-outlined-text-field>

              <md-outlined-text-field
                id="subGuildInput"
                label="부길드"
                autocomplete="off"
                supporting-text=", 로 구분해서 입력">
              </md-outlined-text-field>

              <details class="advanced-settings">
                <summary>세부 설정</summary>
                <div class="settings-content">
                  <md-outlined-select id="rateLimitInput" label="API 속도">
                    <md-select-option selected value=""><div slot="headline">자동</div></md-select-option>
                    <md-select-option value="220"><div slot="headline">개발키 5/s</div></md-select-option>
                    <md-select-option value="100"><div slot="headline">10/s</div></md-select-option>
                    <md-select-option value="20"><div slot="headline">50/s</div></md-select-option>
                    <md-select-option value="10"><div slot="headline">100/s</div></md-select-option>
                    <md-select-option value="4"><div slot="headline">250/s</div></md-select-option>
                    <md-select-option value="2.5"><div slot="headline">400/s</div></md-select-option>
                  </md-outlined-select>

                  <md-outlined-select id="concurrencyInput" label="동시 요청">
                    <md-select-option value="1"><div slot="headline">1</div></md-select-option>
                    <md-select-option value="2"><div slot="headline">2</div></md-select-option>
                    <md-select-option value="3"><div slot="headline">3</div></md-select-option>
                    <md-select-option value="4"><div slot="headline">4</div></md-select-option>
                    <md-select-option selected value="6"><div slot="headline">6</div></md-select-option>
                    <md-select-option value="8"><div slot="headline">8</div></md-select-option>
                    <md-select-option value="12"><div slot="headline">12</div></md-select-option>
                    <md-select-option value="16"><div slot="headline">16</div></md-select-option>
                  </md-outlined-select>
                </div>
              </details>

              <div class="button-row">
                <md-filled-button id="inspectButton" type="button">전체 조회</md-filled-button>
                <md-outlined-button id="searchButton" type="button">길드 검색</md-outlined-button>
                <md-outlined-button id="favoriteAddButton" type="button">즐겨찾기 추가</md-outlined-button>
                <md-outlined-button id="stopButton" type="button" disabled>중지</md-outlined-button>
                <md-outlined-button id="resetButton" type="button">초기화</md-outlined-button>
              </div>
            </section>

            <section class="favorites-panel" aria-label="즐겨찾기">
              <div class="favorites-title">즐겨찾기</div>
              <md-list id="favoriteList" class="favorite-list"></md-list>
            </section>
          </aside>
          <a class="api-credit sidebar-credit" href="https://openapi.nexon.com/ko/guide/request-api/" target="_blank" rel="noreferrer">DATA BASED ON NEXON OPEN API</a>
        </div>

        <!-- 우측 시원한 데이터 캔버스 -->
        <main class="layout-main">
          <section class="status-band" aria-live="polite">
            <div class="status-copy">
              <div class="status-title-row">
                <strong id="statusText">대기 중</strong>
                <md-icon-button id="cacheDeleteButton" class="status-icon-button" aria-label="현재 조회 캐시 삭제" title="현재 조회 캐시 삭제" hidden>
                  <md-icon class="material-symbol-icon">delete</md-icon>
                </md-icon-button>
              </div>
              <span id="statusSubtext"></span>
              <md-linear-progress id="inlineProgressBar" class="inline-progress" value="0" aria-label="조회 진행률"></md-linear-progress>
            </div>
            <div class="status-actions" aria-label="보기 설정">
              <md-outlined-segmented-button-set id="viewModeControl" class="view-mode-control" aria-label="보기 모드">
                <md-outlined-segmented-button id="imageModeButton" label="이미지" selected></md-outlined-segmented-button>
                <md-outlined-segmented-button id="simpleModeButton" label="간단"></md-outlined-segmented-button>
                <md-outlined-segmented-button id="compactModeButton" label="압축"></md-outlined-segmented-button>
              </md-outlined-segmented-button-set>
              <md-icon-button id="themeToggleButton" aria-label="테마 전환">
                <svg class="theme-icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                  <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.01c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>
                </svg>
                <svg class="theme-icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" style="display: none;">
                  <path d="M12 3c.13 0 .26 0 .38.02-3.85.89-6.38 4.72-5.49 8.57.7 3.05 3.01 5.36 6.06 6.06 3.85.89 7.68-1.64 8.57-5.49.02.12.02.25.02.38a9 9 0 1 1-9-9z"/>
                </svg>
              </md-icon-button>
            </div>
          </section>

          <section id="summarySection" class="summary-strip" aria-label="조회 요약" hidden>
            <dl class="summary-list">
              <div>
                <dt>길드</dt>
                <dd id="summaryGuild">-</dd>
              </div>
              <div>
                <dt>길드원</dt>
                <dd id="summaryMembers">0</dd>
              </div>
              <div>
                <dt>완료</dt>
                <dd id="summaryCompleted">0</dd>
              </div>
              <div>
                <dt>유챔 캐릭터</dt>
                <dd id="summaryChampions">0</dd>
              </div>
              <div>
                <dt>오류</dt>
                <dd id="summaryErrors">0</dd>
              </div>
            </dl>
          </section>

          <section id="resultSection" class="results-section" hidden>
            <div class="section-title">
              <h2>길드원 조회 결과</h2>
              <div class="section-actions">
                <md-outlined-button id="exportButton" type="button" disabled>JSON 내보내기</md-outlined-button>
                <md-outlined-button id="excelExportButton" type="button" disabled>Excel 내보내기</md-outlined-button>
                <md-outlined-text-field
                  id="filterInput"
                  class="filter-label"
                  label="필터"
                  placeholder="캐릭터, 직업, 길드"
                  autocomplete="off">
                </md-outlined-text-field>
              </div>
            </div>
            <div id="results" class="results"></div>
          </section>
        </main>
      </div>
    </div>

    <template id="memberCardTemplate">
      <article class="member-card">
        <div class="member-main">
          <div class="avatar-frame">
            <img class="avatar" alt="" loading="lazy" />
          </div>
          <div class="member-copy">
            <div class="member-heading">
              <h3></h3>
              <span class="badge"></span>
            </div>
            <div class="meta-row"></div>
            <div class="error-list"></div>
          </div>
        </div>
        <div class="champion-list"></div>
        <details class="raw-details">
          <summary>원본 데이터</summary>
          <pre></pre>
        </details>
      </article>
    </template>

  </body>
</html>
