<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="예티조아">
  <meta property="og:title" content="메이플 유니온 테트리스 실험실">
  <meta property="og:description" content="예티조아">
  <meta property="og:type" content="website">
  <meta property="og:image" content="../_astro/main_logo.vngKxTZF.png">
  <link rel="icon" href="../favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="../fonts/fonts.css">
  <link rel="stylesheet" href="./style.css?v=20260419-corner-packages-41">
  <script defer src="./app.js?v=20260419-corner-packages-41"></script>
  <title>메이플 유니온 테트리스 실험실</title>
</head>
<body>
  <div id="corner-package-alert" class="solver-alert" role="status" aria-live="polite" hidden>
    <button id="corner-package-dismiss-button" class="solver-alert-close" type="button" aria-label="알림 닫기">×</button>
    <div class="solver-alert-copy">
      <strong id="corner-package-alert-title">실험적 기능 추천</strong>
      <span id="corner-package-alert-message">이 배치는 탐색 시간이 길어질 수 있습니다.<br>법사 우선 배치 옵션을 활성화해 보세요.</span>
    </div>
    <button id="corner-package-enable-button" class="solver-alert-button" type="button">다음 탐색부터 켜기</button>
  </div>
  <div class="page-shell">
    <header class="topbar">
      <div class="title-block">
        <a class="back-link" href="/">
          <img src="../_astro/main_logo.vngKxTZF.png" alt="" width="800" height="608">
          <span>Yettttie</span>
        </a>
        <h1>메이플 유니온 테트리스</h1>
      </div>
      <label class="toggle-field theme-toggle">
        <span id="theme-toggle-label">라이트 모드</span>
        <input id="theme-toggle-input" type="checkbox" aria-label="다크 모드 전환">
      </label>
    </header>

    <main class="tool-shell">
      <section class="panel toolbar-panel">
        <div class="toolbar-row toolbar-compact">
          <div class="toolbar-options">
            <label class="inline-field">
              <span>타임아웃</span>
              <input id="timeout-input" type="number" min="1" max="180" step="1" value="120">
              <small>초 단위</small>
            </label>
            <label class="inline-field">
              <span>탐색 로직</span>
              <select id="solver-mode-select">
                <option value="exact_cover">정확 탐색 (완전 탐색)</option>
                <option value="branch_and_bound">최적화 탐색 (분기 한정 탐색)</option>
                <option value="heuristic_fast">빠른 탐색 (휴리스틱 + 백트래킹)</option>
                <option value="heuristic_pruned">강화 탐색 (휴리스틱 + 백트래킹 + 가지치기)</option>
                <option value="heuristic_late_prune">후반 강화 탐색 (후반 가지치기)</option>
              </select>
            </label>
            <label class="toggle-field experiment-toggle">
              <input id="corner-package-input" type="checkbox" aria-describedby="corner-package-help">
              <span>실험적 기능 : 법사 우선 배치</span>
              <span id="corner-package-help" class="experiment-popover" role="tooltip">
                250 법사 블럭이 4개 이상일 때 유용합니다.<br>
                일반 배치에서 20초 이내 결과가 나오지 않으면 켜보세요.
              </span>
            </label>
          </div>
          <div class="action-row">
            <button id="solve-button" class="primary-button" type="button">자동 배치 시작</button>
            <button id="stop-button" class="danger-button" type="button" disabled>중지</button>
          </div>
        </div>
      </section>

      <section class="status-strip">
        <div class="status-item"><span>목표 칸</span><strong id="target-count">0</strong></div>
        <div class="status-item"><span>조각 칸</span><strong id="piece-count">0</strong></div>
        <div class="status-item"><span>캐릭터 수</span><strong id="character-count">0</strong></div>
        <div class="status-item"><span>상태</span><strong id="solver-status">대기</strong></div>
        <div class="status-item"><span>경과 시간</span><strong id="elapsed-time">0.00s</strong></div>
        <div class="status-item"><span>반복 횟수</span><strong id="iteration-count">0</strong></div>
      </section>

      <section class="workspace">
        <section class="panel board-panel">
          <div class="panel-header compact-header">
            <div class="panel-title-row">
              <h2>보드</h2>
              <span id="board-caption" class="inline-caption">대기 중</span>
            </div>
            <div class="panel-actions">
              <label class="toggle-field">
                <input id="region-click-input" type="checkbox">
                <span>지역 단위 선택</span>
              </label>
              <label
                class="toggle-field"
                title="실시간으로 화면을 갱신하므로 출력 시간이 추가되어 탐색이 더 느려질 수 있습니다."
              >
                <input id="live-solve-input" type="checkbox">
                <span>실시간 보기</span>
              </label>
              <button id="clear-button" class="ghost-button" type="button">보드 초기화</button>
            </div>
          </div>

          <div class="board-frame">
            <div id="board-grid" class="board-grid" aria-label="유니온 보드"></div>
          </div>
          <div class="board-slot-row" role="tablist" aria-label="저장된 보드">
            <button class="board-slot-button active" type="button" data-board-slot="0" role="tab" aria-selected="true">1</button>
            <button class="board-slot-button" type="button" data-board-slot="1" role="tab" aria-selected="false">2</button>
            <button class="board-slot-button" type="button" data-board-slot="2" role="tab" aria-selected="false">3</button>
            <button class="board-slot-button" type="button" data-board-slot="3" role="tab" aria-selected="false">4</button>
            <button class="board-slot-button" type="button" data-board-slot="4" role="tab" aria-selected="false">5</button>
          </div>
        </section>

        <aside class="panel piece-panel">
          <div class="panel-header compact-header">
            <h2>유니온 대원 수</h2>
            <button id="clear-piece-button" class="ghost-button" type="button">캐릭터 초기화</button>
          </div>
          <button id="nexon-api-button" class="nexon-api-button" type="button">NEXON OPEN API 사용</button>
          <div id="piece-list" class="piece-list"></div>
        </aside>
      </section>
    </main>

    <footer class="site-footer">
      <p>
        제작: Yettttie · 루나/루네e · 문의:
        <a class="footer-link-text" href="https://open.kakao.com/me/lu_ne" target="_blank" rel="noopener noreferrer">https://open.kakao.com/me/lu_ne</a>
      </p>
      <p>Data based on NEXON Open API</p>
    </footer>
  </div>

  <dialog id="nexon-dialog" class="nexon-dialog">
    <div class="nexon-dialog-shell">
      <div class="nexon-dialog-header">
        <div>
          <h2>NEXON OPEN API 캐릭터 선택</h2>
          <p id="nexon-dialog-summary">API 키를 입력하고 캐릭터 목록을 불러오세요.</p>
        </div>
        <button id="nexon-dialog-close" class="icon-button" type="button" aria-label="닫기">×</button>
      </div>

      <div class="nexon-api-controls">
        <label class="nexon-api-key-field">
          <span class="nexon-api-key-label-row">
            <span>NEXON OPEN API 키</span>
            <a href="https://openapi.nexon.com/ko/my-application/" target="_blank" rel="noopener noreferrer">API 키 가져오기</a>
          </span>
          <input id="nexon-api-key-input" type="password" autocomplete="off" spellcheck="false">
        </label>
        <button id="nexon-load-button" class="primary-button" type="button">불러오기</button>
      </div>

      <div class="nexon-selection-controls">
        <label class="inline-field">
          <span>상위 선택</span>
          <input id="nexon-top-count-input" type="number" min="0" max="0" step="1" value="0">
          <small>명</small>
        </label>
        <button id="nexon-top-select-button" class="ghost-button" type="button">상위 공격대원 수 선택</button>
        <button id="nexon-clear-selection-button" class="ghost-button" type="button">전부 해제하기</button>
        <span id="nexon-selection-count" class="nexon-selection-count">0 / 0</span>
      </div>

      <div id="nexon-status" class="nexon-status">대기 중</div>
      <div id="nexon-character-list" class="nexon-character-list" aria-label="캐릭터 목록"></div>

      <div class="nexon-dialog-actions">
        <button id="nexon-cancel-button" class="ghost-button" type="button">취소</button>
        <button id="nexon-confirm-button" class="primary-button" type="button">확인</button>
      </div>
    </div>
  </dialog>
</body>
</html>
